<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Music Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <div class="main-layout">

        <div class="controls-panel">
            <h2>Configuración</h2>
            <p>Personaliza tu tarjeta musical</p>

            <input type="text" id="urlInput" placeholder="Pega el link de YouTube Music aquí">

            <button class="btn-primary" onclick="generateCard()">Generar Tarjeta</button>

            <div class="toggle-group">
                <button class="btn-secondary" onclick="toggleLayout()">Cambiar Modo (H/V)</button>

                <label class="checkbox-label">
                    <input type="checkbox" id="borderToggle" checked onchange="toggleBorders()"> Bordes
                </label>
            </div>
        </div>

        <div class="preview-container">

            <div class="card-wrapper">
                <div class="card vertical" id="musicCardFront">
                    <div class="card-inner">
                        <img id="cardCover" src="https://via.placeholder.com/300" alt="Cover">
                        <div class="card-info">
                            <h2 id="cardTitle">Título de la Canción</h2>
                            <h3 id="cardArtist">Artista</h3>
                            <h4 id="cardAlbum"
                                style="font-size: 0.9rem; color: #888; margin: -10px 0 15px 0; font-weight: normal;">
                                Álbum</h4>

                            <div class="player-time-info"
                                style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #b3b3b3; margin-bottom: 5px;">
                                <span>0:00</span>
                                <span id="cardDuration">0:00</span>
                            </div>
                            <div class="player-progress">
                                <div class="progress-bar"></div>
                            </div>
                            <div class="player-controls">⏮ ⏸ ⏭</div>
                        </div>
                    </div>
                </div>
                <button class="btn-card-download" id="downloadFrontBtn">⬇ Descargar Frontal</button>
            </div>

            <div class="card-wrapper">
                <div class="card vertical" id="musicCardBack">
                    <div class="card-inner back-content">
                        <h3>Escuchar en YT Music</h3>
                        <img id="cardQR" src="https://via.placeholder.com/150" alt="Código QR">
                        <p class="logo-sub">Music Card Collectible</p>
                    </div>
                </div>
                <button class="btn-card-download" id="downloadBackBtn">⬇ Descargar Trasero</button>
            </div>

        </div>

    </div>

</body>

</html>
